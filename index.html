<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Al-Wujood Encyclopedia</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* 🌌 header */
#header{
position:fixed;
top:0;
left:0;
right:0;
padding:10px;
background:#000;
color:#00e5ff;
z-index:10;
text-align:center;
}

/* 📚 eras */
#eras{
position:fixed;
top:60px;
left:10px;
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
}

.era{
padding:10px;
background:#111;
border:1px solid #00e5ff;
cursor:pointer;
border-radius:8px;
}

/* 📖 content */
#content{
position:fixed;
right:10px;
top:60px;
bottom:10px;
width:60%;
overflow:auto;
padding:10px;
}

/* 📦 cards */
.card{
background:#111;
border:1px solid #00e5ff;
margin-bottom:10px;
padding:10px;
border-radius:10px;
cursor:pointer;
}

#details{
position:fixed;
bottom:10px;
left:10px;
right:10px;
padding:10px;
background:#111;
border:1px solid #00e5ff;
border-radius:10px;
z-index:10;
}
</style>
</head>

<body>

<div id="header">🌌 Al-Wujood Interactive Encyclopedia</div>

<!-- 🌍 ERAS -->
<div id="eras">
<div class="era" onclick="loadEra('ancient')">Ancient</div>
<div class="era" onclick="loadEra('myth')">Myth</div>
<div class="era" onclick="loadEra('prophetic')">Prophetic</div>
</div>

<!-- 📚 CONTENT -->
<div id="content"></div>

<!-- 📖 DETAILS -->
<div id="details">Select an item...</div>

<script src="script.js"></script>

</body>
</html>
