<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myth World Codex</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌟 HERO -->
<header class="hero">
  <h1>MYTH WORLD</h1>
  <p>Ultimate Interactive Universe Codex</p>

  <!-- 👑 TEAM -->
  <div class="credits">
    Created by:
    <b>Osama Mohamed</b> ·
    <b>Ahmed Al-khlil</b> ·
    <b>Anas Al-abdolkarem</b> ·
    <b>Thabet Hameed</b> ·
    <b>Alyman Hamied</b>
  </div>
</header>

<!-- 🔍 SEARCH -->
<div class="searchBox">
  <input id="search" placeholder="Search the universe..." onkeyup="search()">
</div>

<!-- 📚 GRID (JS will fill it) -->
<div class="grid" id="grid"></div>

<!-- 📦 DETAILS PANEL -->
<div id="panel">
  <h2 id="name"></h2>

  <img id="img" style="width:100%; border-radius:12px; margin:10px 0;">

  <p id="meta"></p>
  <p id="desc"></p>

  <button onclick="closePanel()">Close</button>
</div>

<!-- 🧠 SCRIPT -->
<script src="script.js"></script>

</body>
</html>
