<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al-Wujood</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🚀 INTRO -->
<div class="intro">
<h1>Al-Wujood</h1>

<p>Space Exploration System</p>

<div class="team">
Osama Mohamed • Ahmed Al-khlil • Anas Al-abdolkarem • Thabet Hameed • Alyman Hamied<br>
Damascus University - Computer Engineering & Automation
</div>

<button onclick="start()">ENTER SPACE</button>
</div>

<!-- 🪐 PLANETS -->
<div class="nasa-section">
<h2>SOLAR SYSTEM</h2>

<div class="nasa-grid">

<div class="nasa-card" onclick="openPlanet('Mercury')">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg">
<h3>Mercury</h3>
</div>

<div class="nasa-card" onclick="openPlanet('Venus')">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Venus_-_real_color.jpg">
<h3>Venus</h3>
</div>

<div class="nasa-card" onclick="openPlanet('Earth')">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
<h3>Earth</h3>
</div>

<div class="nasa-card" onclick="openPlanet('Mars')">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg">
<h3>Mars</h3>
</div>

<div class="nasa-card" onclick="openPlanet('Jupiter')">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg">
<h3>Jupiter</h3>
</div>

<div class="nasa-card" onclick="openPlanet('Saturn')">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg">
<h3>Saturn</h3>
</div>

</div>
</div>

<!-- 🌌 STARS -->
<canvas id="stars"></canvas>

<!-- 🪐 POPUP -->
<div id="popup" class="popup hidden">

<h2 id="pname"></h2>
<img id="pimg" style="width:120px;border-radius:10px;margin:10px 0;">
<p id="pinfo"></p>

<button onclick="closePopup()">Close</button>

</div>

<script src="script.js"></script>

</body>
</html>
