<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myth World</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header>
  <h1>MYTH WORLD</h1>
  <p>A living archive of myths, gods and forgotten worlds</p>

  <input id="search" placeholder="Search Myth World..." onkeyup="searchCards()">
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Creatures</a>
  <a href="#">Gods</a>
  <a href="#">Civilizations</a>
  <a href="#">Timeline</a>
</nav>

<main class="grid">

  <div class="card" onclick="openCard('Dragon', 'A legendary fire beast that guards ancient realms.')">
    <h2>🐉 Dragon</h2>
    <p>Fire beast of legends</p>
  </div>

  <div class="card" onclick="openCard('Zeus', 'King of Olympus and god of thunder.')">
    <h2>⚡ Zeus</h2>
    <p>Ruler of Olympus</p>
  </div>

  <div class="card" onclick="openCard('Atlantis', 'A lost advanced civilization beneath the ocean.')">
    <h2>🏺 Atlantis</h2>
    <p>Lost civilization</p>
  </div>

  <div class="card" onclick="openCard('Titan', 'Primordial beings that existed before the gods.')">
    <h2>🌌 Titans</h2>
    <p>Ancient entities</p>
  </div>

</main>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h2 id="title"></h2>
    <p id="desc"></p>
    <button onclick="closeCard()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
