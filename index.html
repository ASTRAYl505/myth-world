<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myth World - Living Universe</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="stars"></div>

<div class="hero">
  <h1>MYTH WORLD</h1>
  <p>Where Legends Come Alive</p>

  <div class="creator">
    <span>Created by: <b>YOUR NAME</b></span>
  </div>

  <input id="search" onkeyup="searchWorld()" placeholder="Search the universe...">
</div>
<header>
  <h1>MYTH WORLD</h1>
  <p>Living Interactive Universe</p>

  <input id="search" onkeyup="searchWorld()" placeholder="Search the universe...">
</header>

<nav>
  <button onclick="filter('all')">All</button>
  <button onclick="filter('gods')">Gods</button>
  <button onclick="filter('anime')">Anime</button>
  <button onclick="filter('myth')">Myth</button>
  <button onclick="filter('animals')">Animals</button>
</nav>

<main class="grid">

  <div class="card gods" onclick="openPanel('Zeus','King of Olympus, god of thunder')">⚡ Zeus</div>
  <div class="card gods" onclick="openPanel('Hades','Ruler of Underworld')">💀 Hades</div>

  <div class="card myth" onclick="openPanel('Dragon','Fire guardian of ancient realms')">🐉 Dragon</div>
  <div class="card myth" onclick="openPanel('Phoenix','Rebirth from ashes')">🔥 Phoenix</div>

  <div class="card anime" onclick="openPanel('Luffy','Pirate King of One Piece')">🏴‍☠️ Luffy</div>
  <div class="card anime" onclick="openPanel('Eren','Attack Titan user')">⚔️ Eren</div>
  <div class="card anime" onclick="openPanel('Light','Death Note owner')">📓 Light</div>

  <div class="card animals" onclick="openPanel('Lion','King of beasts')">🦁 Lion</div>
  <div class="card animals" onclick="openPanel('Eagle','Sky hunter')">🦅 Eagle</div>

</main>

<!-- SIDE PANEL -->
<div id="panel">
  <h2 id="title"></h2>
  <p id="desc"></p>
  <button onclick="closePanel()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
