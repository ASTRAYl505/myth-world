<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الوجود</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo',system-ui;
background:black;
overflow:hidden;
color:white;
text-align:center;
}

/* 🌌 STARS */
.stars{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(#ffffff33 1px,transparent 1px);
background-size:90px 90px;
animation:move 120s linear infinite;
opacity:0.25;
z-index:-1;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-2000px);}
}

/* 🎬 INTRO SCREEN */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#title{
font-size:70px;
color:#00e5ff;
text-shadow:0 0 30px #00e5ff,0 0 80px #7c4dff;
animation:zoom 2s ease;
}

#subtitle{
color:#aaa;
margin-top:10px;
}

/* 🚀 SKIP BUTTON */
#skip{
position:absolute;
bottom:30px;
padding:10px 20px;
background:#00e5ff;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

/* 🎬 STAR WARS CREDITS */
.sw-wrapper{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
perspective:400px;
z-index:9998;
}

.sw{
position:absolute;
bottom:-100%;
width:100%;
text-align:center;
color:gold;
transform:rotateX(25deg);
animation:scroll 18s linear forwards;
}

.sw h2{
font-size:20px;
margin-bottom:30px;
}

.sw p{
margin:10px 0;
}

@keyframes scroll{
0%{bottom:-120%;}
100%{bottom:120%;}
}

/* 🌍 MAIN */
#main{
display:none;
padding:40px;
}

.show{
display:block;
}

@keyframes zoom{
from{transform:scale(0.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- 🎬 INTRO -->
<div id="intro">
  <div id="title">الوجود</div>
  <div id="subtitle">AL-WUJUD</div>
  <button id="skip" onclick="start()">Skip Intro</button>
</div>

<!-- 🎵 SOUND -->
<audio id="sound" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b7f7c0b8.mp3">
</audio>

<!-- 🎬 CREDITS -->
<div class="sw-wrapper" id="credits">
  <div class="sw">
    <h2>PROJECT CREDITS</h2>
    <p>Osama Mohamed</p>
    <p>Ahmed Al-khlil</p>
    <p>Anas Al-abdolkarem</p>
    <p>Thabet Hameed</p>
    <p>Alyman Hamied</p>
    <h2>THE WORLD OF EXISTENCE</h2>
  </div>
</div>

<!-- 🌍 MAIN CONTENT -->
<div id="main">
  <h1>الوجود</h1>
  <p>موسوعة العصور والأساطير والكائنات</p>
</div>

<script>

function start(){
document.getElementById("intro").style.display="none";
document.getElementById("credits").style.display="none";
document.getElementById("main").classList.add("show");

let audio=document.getElementById("sound");
audio.volume=0.5;
audio.play();
}

// auto start after credits
setTimeout(()=>{
start();
},18000);

</script>

</body>
</html>
