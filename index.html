<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myth World - Living Universe</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="space"></div>
<div class="glow"></div>

<header class="ui">
  <h1>MYTH WORLD</h1>
  <p>Living Interactive Universe</p>
</header>

<!-- 🌍 WORLD CANVAS -->
<div id="world">

  <div class="era" style="--x:20; --y:30" onclick="openEra('Mythic Age','Before time existed')">
    🌌 Mythic Age
  </div>

  <div class="era" style="--x:60; --y:20" onclick="openEra('Age of Gods','Olympus domination')">
    ⚡ Gods Age
  </div>

  <div class="era" style="--x:40; --y:60" onclick="openEra('Medieval Age','Kings and castles')">
    🏰 Medieval
  </div>

  <div class="era" style="--x:70; --y:70" onclick="openEra('Ottoman Era','Empire expansion')">
    🕌 Ottoman
  </div>

  <div class="era" style="--x:30; --y:80" onclick="openEra('Victorian Era','Steam & science')">
    🎩 Victorian
  </div>

</div>

<!-- 📦 DETAIL PANEL -->
<div id="panel">
  <h2 id="title"></h2>
  <p id="desc"></p>
  <button onclick="closePanel()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
