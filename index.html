<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al-Wujood</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌌 BACKGROUND -->
<div class="bg"></div>

<!-- 🎬 INTRO -->
<section class="intro">

<h1>Al-Wujood</h1>
<p>NASA Style Solar System Interface</p>

<button onclick="start()">ENTER SPACE</button>

</section>

<!-- 🪐 PLANETS -->
<section class="nasa-section" id="planets">

<h2 class="title">SOLAR SYSTEM</h2>

<div class="grid">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg">
<h3>Mercury</h3>
<p>Smallest planet</p>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Venus_-_real_color.jpg">
<h3>Venus</h3>
<p>Hot toxic atmosphere</p>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg">
<h3>Earth</h3>
<p>Life planet</p>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg">
<h3>Mars</h3>
<p>Red planet</p>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg">
<h3>Jupiter</h3>
<p>Gas giant</p>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg">
<h3>Saturn</h3>
<p>Ring planet</p>
</div>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
